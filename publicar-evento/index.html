  <script type="module">

    }
  </script>
  <style>

  <script type="module">
    import { requestNotificationPermission, showNotification } from "/utils/notifications.js";
    import {
      convertBlobsToBase64,
      compressFileImage,
      compressImageBlob
    } from "/utils/images.js"

    const form = document.querySelector("form");
    const api = `https://script.google.com/macros/s/AKfycbx-aF03sO-JizuijiMY1tu5v0GXhzH08GUtkUy0tegwzB8LLQ-VwzD7YEQ-vK1YEcK_/exec`;
    const query = `?endpoint=uploadEvent`;
    let action = `${api}${query}`;
    const SHARE_TARGET_ACTION = "/share-target"; // Also used as the cache key for the shared data

    form.addEventListener("submit", handleFormSubmit);

    const description = document.getElementById("description");
    description.addEventListener("input", async () => {
      const cache = await caches.open(SHARE_TARGET_ACTION);
      await cache.put(`/description`, new Response(description.value, { headers: { "Content-Type": "text/plain" } }));

      // Resize the textarea to fit the content as user types
      description.style.height = "auto"; // Reset height to auto to shrink if needed
      description.style.height = `${description.scrollHeight}px`;
    });

    const files = document.getElementById("files");
    files.addEventListener("change", async (event) => await proccessNewFiles(event.target.files));

    async function proccessNewFiles(files) {
      const cache = await caches.open(SHARE_TARGET_ACTION);
      const filesList = await getCachedFilesList();

      for (const file of files) {
        const uuid = crypto.randomUUID();
        const [compressedFile, contentType] = await compressImageBlob(file);
        await cache.put(`/${uuid}`, new Response(compressedFile, { headers: { "Content-Type": contentType } }));
        filesList.push(uuid);
        addPreviewImage(compressedFile, uuid);
      }

      await cache.put(
        `/files-list`, // Store the list of file IDs in the cache so we can ensure to use the user's desired order.
        new Response(JSON.stringify(filesList), { headers: { "Content-Type": "application/json" } })
      );
    }

    /**
     * Retrieves cached file blobs from the SHARE_TARGET_ACTION cache.
     * Filters out non-image files based on the content type.
     * @returns {Promise<Blob[]>} - Promise resolving to an array of Blob objects representing image files.
     */
    async function getCachedFileBlobs() {
      const cache = await caches.open(SHARE_TARGET_ACTION);
      const fileBlobs = [];
      // const keys = await cache.keys();
      const filesList = await getCachedFilesList();

      for (const fileId of filesList) {
        const response = await cache.match(`/${fileId}`);
        if (response && response.headers.get("content-type")?.startsWith("image/")) {
          const blob = await response.blob();
          if (blob.size > 0) {
            console.info(`Adding cached file: ${fileId}`);
            blob.fileId = fileId; // Store the file ID in the blob for reference
            fileBlobs.push(blob);
          }
        }
      }
      return fileBlobs;
    }

    async function getCachedFilesList() {
      const cache = await caches.open(SHARE_TARGET_ACTION);
      const filesListResponse = await cache.match(`/files-list`);
      return filesListResponse ? await filesListResponse.json() : [];
    }

    async function extractSuccessResponse(response) {
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      const jsonResponse = await response.json();
      if (!jsonResponse.success) throw new Error(jsonResponse.message);
      return jsonResponse.data;
    }

    function showMissingFieldsError(missingFields) {
      const output = document.querySelector("output[name=output]");
      output.textContent += "Evento incompleto... No se reconocen los siguientes campos:\n\n";
      for (const key of Object.keys(missingFields)) {
        output.textContent += `❌ ${missingFields[key]}\n`;
      }
      output.textContent += "\nPor favor agregá los datos faltantes en la descripción e intentá de nuevo.\n";
    }

    class MissingFieldsError extends Error {
      constructor(missingFields) {
        const message = `Evento incompleto... No se reconocen los siguientes campos:\n\n${Object.entries(
          missingFields
        )
          .map(([key, msg]) => `❌ ${msg}`)
          .join("\n")}`;
        super(message);
        this.missingFields = missingFields;
      }
    }

    async function handleFormSubmit(event) {
      event.preventDefault();
      const submitButton = document.querySelector("button[type=submit]");
      const submitButtonSpan = submitButton.querySelector("span");
      const buttonText = submitButtonSpan.textContent;
      const output = document.querySelector("output[name=output]");

      const images = await getCachedFileBlobs();
      if (images.length === 0) {
        alert("Al menos una imagen requerida.");
        return;
      }

      // Request notification permission before starting the operation
      await requestNotificationPermission();

      submitButton.disabled = true; // We use submitButton.value to store the event ID if already created, as a retry mechanism.
      submitButtonSpan.textContent = "Publicando...\n";

      try {
        let pendingEventId = submitButton.value;
        let eventData = { id: pendingEventId };

        if (pendingEventId) {
          output.textContent += "\nReintentando la carga...\n";
        } else {
          eventData = await postEvent();
          pendingEventId = eventData.id;
          submitButton.value = pendingEventId;
          output.textContent += "\n✔️ Solicitud recibida con éxito...\n";
        }

        let retries = 0;
        let error = null;
        const maxRetries = pendingEventId ? 5 : 7; // Less retries if re-trying an existing event
        const missingFields = {};
        while (!eventData?.slug) {
          output.textContent += "Procesando la información del evento...\n";
          const getEventByIdQuery = `?endpoint=getEventByIdAndProcessItIfNeeded&id=${eventData.id}`;
          try {
            eventData = await extractSuccessResponse(await fetch(api + getEventByIdQuery));
          } catch (e) {
            console.error("Error fetching event", eventData, e);
            error = e;
          }
          const eventUploadCompleted = eventData?.slug;
          if (eventUploadCompleted) break;

          if (eventData.title) {
            // It has been enriched, but no slug means some required fields are missing
            for (const [key, msg] of [
              ["startsAt", "Fecha y hora de inicio"],
              ["locality", "Localidad (No se reconoce la localidad de Traslasierra y alrededores)"],
            ]) {
              if (!eventData[key]) {
                missingFields[key] = msg;
              }
            }
            throw new MissingFieldsError(missingFields);
          }

          retries++;
          if (retries >= maxRetries) {
            throw new Error(
              `timeout: no se obtuvo link al evento en tiempo suficiente.\n\nPor favor intente nuevamente.\n\nError: ${error.name}: ${error.message}`
            );
          }
          await new Promise((resolve) => setTimeout(resolve, 2000));
        }

        if (document.visibilityState !== "visible") {
          const notification = await showNotification("Evento cargado!", {
            body: "Tu evento ya está listo para ver.",
            requireInteraction: true,
            data: { type: "event-posted", url: `${window.location.origin}/${eventData.slug}` },
          });
        }

        submitButtonSpan.textContent = "Evento cargado! 👌";
        const isTestEnvironment = location.hostname === "localhost" && form.description.value?.includes("test");
        if (isTestEnvironment) {
          if (form.description.value?.includes("fail")) {
            throw new Error("Failing as requested in test mode.");
          }
          return; // Force the SW do the redirection / open new page on notification click.
        }

        output.textContent += "\nRedirigiendo a la página del evento...\n";
        console.info(`redirecting to event page at ${window.location.origin}/${eventData.slug}`);

        // Event uploaded or found succesfully
        const cache = await caches.open(SHARE_TARGET_ACTION);
        for (const key of await cache.keys()) {
          console.info(`Deleting cache entry: ${key.url}`);
          cache.delete(key);
        }
        for (const preview of document.querySelectorAll("image-preview")) {
          preview.remove();
        }
        // Clear the form (but not the description field)
        // Redirect to the event page
        window.location.href = `${window.location.origin}/${eventData.slug}`;
      } catch (error) {
        if (error instanceof MissingFieldsError) {
          showMissingFieldsError(error.missingFields);
        } else {
          output.textContent += `Error al cargar el evento 👎\n${error.name}: ${error.message}\n`;
        }
        alert(
          `Hubo un error al intentar cargar el evento.\n${error.name}: ${error.message}\n\nContáctenos si el problema persiste.`
        );
        submitButton.disabled = false;
        submitButtonSpan.textContent = buttonText + " (Reintentar)";
      }
    }

    async function postEvent() {
      // Convert images to base64 format
      const requestFiles = await convertBlobsToBase64(await getCachedFileBlobs());

      // Check if service worker is available and ready
      if (!navigator.serviceWorker) {
        throw new Error("Service worker no disponible. Intenta recargar la página.");
      }

      // Get service worker for message passing
      let serviceWorker;
      if (navigator.serviceWorker.controller) {
        // Use the controller if available
        serviceWorker = navigator.serviceWorker.controller;
      } else {
        // Fall back to using the registration's active service worker
        console.log("Waiting for service worker to be ready...");
        try {
          // Add timeout to prevent hanging in test environments
          const registrationPromise = navigator.serviceWorker.ready;
          const timeoutPromise = new Promise((_, reject) =>
            setTimeout(() => reject(new Error("Service worker ready timeout")), 3000)
          );

          const registration = await Promise.race([registrationPromise, timeoutPromise]);
          serviceWorker = registration.active;

          if (!serviceWorker) {
            return alert("Service worker no disponible. Intenta recargar la página.");
          }
        } catch (error) {
          return alert("Service worker no disponible. Intenta recargar la página. Error " + error.message);
        }
      }

      // Create a MessageChannel for two-way communication
      const messageChannel = new MessageChannel();

      return new Promise((resolve, reject) => {
        // Set up response handler
        messageChannel.port1.onmessage = (event) => {
          console.log("Received response from service worker:", event.data);
          if (event.data.success) {
            resolve(event.data.data);
          } else {
            reject(new Error(event.data.error));
          }
        };

        console.log("Sending message to service worker:", serviceWorker);
        // Send message to service worker with the second port for response
        serviceWorker.postMessage(
          {
            type: "POST_EVENT",
            payload: {
              api,
              query,
              description: form.description.value,
              files: requestFiles,
            },
          },
          [messageChannel.port2]
        );
        console.log("Message sent to service worker");
      });
    }



    // Cache hydration handling
    async function hydrateWithCachedData() {
      const cache = await caches.open(SHARE_TARGET_ACTION);
      console.info("Hydrating form with cached data...");

      // Hydrate description
      const description = document.getElementById("description");
      const descriptionResponse = await cache.match(`/description`);
      if (descriptionResponse && descriptionResponse.ok) {
        const descriptionText = await descriptionResponse.text();
        console.info("Hydrating description from cache.");
        description.value = descriptionText;
        // Resize the textarea to fit the content
        description.style.height = "auto"; // Reset height to auto to shrink if needed
        description.style.height = `${description.scrollHeight}px`;
      } else {
        console.info("No cached description found.");
      }

      // Hydrate files
      const blobs = await getCachedFileBlobs();
      if (!blobs.length) {
        console.info("No cached files found.");
        return;
      }
      for (const blob of blobs) {
        console.info(`Hydrating file from cache.`);
        addPreviewImage(blob, blob.fileId);
      }
    }

    async function fileToDataURI(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const dataURI = reader.result;
          resolve(dataURI);
        };
        reader.onerror = (error) => reject(error);
        reader.readAsDataURL(file);
      });
    }

    /**
     * Adds a preview image to the imagesPreview container.
     * @param {File} file - The file to preview.
     */
    function addPreviewImage(file, fileId) {
      const imagesPreview = document.getElementById("imagesPreview");
      const imagePreviewElement = document.createElement("image-preview");
      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      imagePreviewElement.appendChild(img);
      const button = document.createElement("button");
      button.textContent = "❌";
      button.type = "button"; // Prevent form submission
      button.title = "Eliminar imagen";
      button.addEventListener("click", async () => {
        const cache = await caches.open(SHARE_TARGET_ACTION);
        const filesList = await getCachedFilesList();
        const index = filesList.indexOf(fileId);
        if (index !== -1) {
          filesList.splice(index, 1); // Remove the file ID from the list
          await cache.put(
            `/files-list`,
            new Response(JSON.stringify(filesList), { headers: { "Content-Type": "application/json" } })
          );
          await cache.delete(`/${fileId}`); // Delete the cached file
          console.info(`Deleted cached file: ${fileId}`);
        }
        imagePreviewElement.remove();
      });
      imagePreviewElement.appendChild(button);
      imagesPreview.insertBefore(imagePreviewElement, imagesPreview.lastElementChild);

      // Reverse debounce: scrollIntoView on the first image added within 250ms
      if (!addPreviewImage.scrollTimeout) {
        addPreviewImage.scrollTimeout = setTimeout(() => {
          img.scrollIntoView({ behavior: "smooth", block: "nearest" });
          addPreviewImage.scrollTimeout = null;
        }, 250);
      }
    }

    hydrateWithCachedData();
  </script>
